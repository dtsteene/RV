# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  id: c5b76a7e-0b48-4131-8e7e-837e5a0d79b3
  title: "Pressure Proxies for Biventricular Myocardial Work: A Finite Element Study"
  description: A finite-element study of pressure-strain proxies for biventricular myocardial work.
  keywords: [
    "cardiac mechanics",
    "finite element method",
    "FEniCSx",
    "RV-LV interaction",
    "computational modeling"
   ]
  authors: [
    {
      name: "Daniel Steeneveldt",
      affiliation: "University of Oslo"
    }
  ]
  github: https://github.com/dtsteene/RV
  # To autogenerate a Table of Contents, run "jupyter book init --write-toc"
  toc:
    - file: intro.md
    - file: 01_the_question/The Scientific Question.md
    - file: 02_the_model/overview.md
      children:
        - file: 02_the_model/geometry.md
        - file: 02_the_model/fibers.md
        - file: 02_the_model/3D_mechanics.md
        - file: 02_the_model/active_contraction.md
        - file: 02_the_model/0D_circulation.md
    - file: 03_implementation/implementation.md
    - file: 04_tuning/tuning.md
    - file: 05_results/results.md
    - file: 06_discussion/discussion.md
    - file: 07_conclusion/conclusion.md

site:
  template: book-theme
  base_url: /RV
  # options:
  #   favicon: favicon.ico
  #   logo: site_logo.png

execute:
  execute_notebooks: off  # Don't execute notebooks automatically (saves time)

# BibTeX configuration
bibtex_bibfiles:
  - references.bib

# Sphinx configuration (needed for citations)
sphinx:
  config:
    bibtex_reference_style: author_year
